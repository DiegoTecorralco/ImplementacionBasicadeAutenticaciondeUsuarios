<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <title>Login</title>
</head>

<body>
    <section class="login-container">
        <h1>ACCESO ESCOLAR</h1>
        <p>Bienvenido al portal académico de próxima generación.</p>
        
        <form class="login-form" id="loginForm">
            <label>CORREO ELECTRÓNICO</label>
            <input type="email" id="email" placeholder="nombre@academia.edu" required />

            <label>CONTRASEÑA</label>
            <input type="password" id="password" placeholder="********" required />
            
            <a href="#" class="forgot-password">¿OLVIDASTE TU CONTRASEÑA?</a>

            <button type="submit">INICIAR SESIÓN →</button>
        </form>
        
        <div class="new-account">
            <p>¿NUEVO EN LA ACADEMIA?</p>
            <a href="#" class="create-account">CREAR NUEVA CUENTA</a>
        </div>
        
        <hr class="divider">
        
        <footer class="login-footer">
            <p>© 2024 GESTIÓN ESCOLAR GLOBAL. ALL RIGHTS RESERVED.</p>
            <div class="footer-links">
                <a href="#">PRIVACY POLICY</a> | 
                <a href="#">TERMS OF SERVICE</a> | 
                <a href="#">HELP CENTER</a>
            </div>
        </footer>
    </section>
</body>

</html>
